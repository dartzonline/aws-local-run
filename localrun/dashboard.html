<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalRun Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.7);
            --bg-card-hover: rgba(51, 65, 85, 0.8);
            --primary: #38bdf8;
            --secondary: #e2e8f0;
            --text-dim: #94a3b8;
            --accent: #818cf8;
            --border: rgba(255, 255, 255, 0.1);
            --glow: 0 0 20px rgba(56, 189, 248, 0.15);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--secondary);
            margin: 0;
            padding: 0;
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(129, 140, 248, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo svg {
            width: 28px;
            height: 28px;
            color: var(--primary);
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
            padding: 0.4rem 1rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #34d399;
            border-radius: 50%;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            background: var(--bg-card-hover);
            box-shadow: var(--glow);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: white;
            text-transform: capitalize;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-body {
            flex-grow: 1;
        }

        .resource-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        /* Scrollbar styling */
        .resource-list::-webkit-scrollbar {
            width: 6px;
        }
        .resource-list::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        .resource-list::-webkit-scrollbar-thumb {
            background: var(--text-dim);
            border-radius: 10px;
        }

        .resource-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }

        .resource-item:last-child {
            border-bottom: none;
        }

        .resource-name {
            font-family: monospace;
            color: var(--secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 70%;
        }

        .resource-stat {
            background: rgba(0,0,0,0.2);
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            color: var(--primary);
            font-weight: 500;
            font-size: 0.8rem;
        }

        .empty-state {
            color: var(--text-dim);
            font-style: italic;
            font-size: 0.9rem;
            text-align: center;
            padding: 1rem 0;
        }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.2);
        }

        button.primary {
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
        }

        button.primary:hover {
            background: #7dd3fc;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            color: white;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z" />
                </svg>
                LocalRun Dashboard
            </div>
            <div class="status-badge">
                <span class="status-dot"></span>
                Local Server Running
            </div>
        </header>

        <div class="controls">
            <button onclick="fetchState()">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Refresh
            </button>
            <button onclick="saveState()">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
                Save State
            </button>
            <button onclick="loadState()">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                Load State
            </button>
        </div>

        <div class="grid" id="grid">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <div class="toast" id="toast">Message here</div>

    <script>
        const serviceIcons = {
            's3': '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>',
            'sqs': '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2h-2m-4-1v8m0 0l3-3m-3 3L9 8m-5 5h2.586a1 1 0 01.707.293l2.414 2.414a1 1 0 00.707.293h3.172a1 1 0 00.707-.293l2.414-2.414a1 1 0 01.707-.293H20"></path></svg>',
            'dynamodb': '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4"></path></svg>',
            'sns': '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5.882V19.24a1.76 1.76 0 01-3.417.592l-2.147-6.15M18 13a3 3 0 100-6M5.436 13.683A4.001 4.001 0 017 6h1.832c4.1 0 7.625-1.234 9.168-3v14c-1.543-1.766-5.067-3-9.168-3H7a3.988 3.988 0 01-1.564-.317z"></path></svg>',
            'lambda': '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>',
            'cloudwatch logs': '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>',
            'secrets manager': '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>',
            'eventbridge': '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>',
            'ssm': '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 9l3 3-3 3m5 0h3M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>'
        };

        const defaultIcon = '<svg width="24" height="24" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>';

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.borderLeft = `4px solid ${isError ? '#ef4444' : '#10b981'}`;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        async function saveState() {
            try {
                const res = await fetch('/_localrun/state/save', { method: 'POST' });
                const json = await res.json();
                if (res.ok) showToast('State saved successfully!');
                else showToast(json.error || 'Failed to save state', true);
            } catch (e) {
                showToast('Failed to save state', true);
            }
        }

        async function loadState() {
            try {
                const res = await fetch('/_localrun/state/load', { method: 'POST' });
                const json = await res.json();
                if (res.ok) {
                    showToast('State loaded successfully!');
                    fetchState();
                } else {
                    showToast(json.error || 'Failed to load state', true);
                }
            } catch (e) {
                showToast('Failed to load state', true);
            }
        }

        function renderCard(serviceName, resources) {
            const icon = serviceIcons[serviceName.toLowerCase()] || defaultIcon;
            
            let listHtml = '';
            if (!resources || resources.length === 0) {
                listHtml = '<div class="empty-state">No resources found</div>';
            } else {
                listHtml = resources.map(res => {
                    const keys = Object.keys(res).filter(k => k !== 'name');
                    const statKey = keys.length > 0 ? keys[0] : null;
                    const statValue = statKey ? `${res[statKey]} ${statKey}` : '';
                    
                    return `
                        <li class="resource-item">
                            <span class="resource-name" title="${res.name}">${res.name}</span>
                            ${statValue ? `<span class="resource-stat">${statValue}</span>` : ''}
                        </li>
                    `;
                }).join('');
            }

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">
                            ${icon}
                            ${serviceName.toUpperCase()}
                        </div>
                        <span style="background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 12px; font-size: 0.8rem;">
                            ${resources.length}
                        </span>
                    </div>
                    <div class="card-body">
                        <ul class="resource-list">
                            ${listHtml}
                        </ul>
                    </div>
                </div>
            `;
        }

        async function fetchState() {
            try {
                const res = await fetch('/_localrun/api/state');
                const data = await res.json();
                
                const grid = document.getElementById('grid');
                grid.innerHTML = '';
                
                // Show S3, SQS, DynamoDB first if they exist
                const priorityOrder = ['s3', 'sqs', 'dynamodb', 'sns', 'lambda'];
                const sortedKeys = Object.keys(data).sort((a, b) => {
                    const idxA = priorityOrder.indexOf(a);
                    const idxB = priorityOrder.indexOf(b);
                    if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                    if (idxA !== -1) return -1;
                    if (idxB !== -1) return 1;
                    return a.localeCompare(b);
                });

                sortedKeys.forEach(service => {
                    grid.innerHTML += renderCard(service, data[service]);
                });
                
            } catch (e) {
                showToast('Failed to fetch state from server', true);
            }
        }

        // Initialize
        fetchState();
        // Auto refresh every 5 seconds
        setInterval(fetchState, 5000);
    </script>
</body>
</html>
