name: Test and Publish to PyPI

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          
      - name: Run Pytest
        run: pytest tests/ -v

  publish:
    needs: test
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # PyPI requires these permissions for Trusted Publishing (OIDC)
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install build tool
        run: python -m pip install build
          
      - name: Build package
        run: python -m build
          
      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
